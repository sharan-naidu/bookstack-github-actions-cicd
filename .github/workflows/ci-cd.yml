
name: "BookStack CI CD Pipeline"

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: "${{ secrets.DOCKER_USERNAME }}/bookstack-cicd"

jobs:
  versioning:
    name: "Versioning Automation"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v6

      - name: "Generate Version"
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v2026.06.${{ github.run_number }}-$SHORT_SHA"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Generated version: $IMAGE_TAG"

  unit-tests:
    name: "Unit Test Cases"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: "8.3"
          coverage: none

      - name: "PHP Syntax Check"
        run: |
          find app lang/en routes database tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: "Validate Required Project Files"
        run: |
          test -f Dockerfile
          test -f docker-compose.yml
          test -d resources/views
          test -d lang/en
          test -d tests

  build-and-push:
    name: "Build and Push Docker Image"
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v6

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Docker Hub Login"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  container-security-scan:
    name: "Container Security Scanning"
    runs-on: ubuntu-latest
    needs:
      - versioning
      - build-and-push
    steps:
      - name: "Trivy Security Scan"
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  slack-notification:
    name: "Slack Notification"
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
      - build-and-push
      - container-security-scan
    if: always()
    steps:
      - name: "Send Slack Notification"
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "BookStack CI/CD Pipeline"
          SLACK_MESSAGE: "Version ${{ needs.versioning.outputs.image_tag }} completed. Image: ${{ env.IMAGE_NAME }}"
          SLACK_COLOR: good

