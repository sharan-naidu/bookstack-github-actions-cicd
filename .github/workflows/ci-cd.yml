
name: BookStack Fast CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bookstack-cicd

jobs:
  versioning:
    name: Versioning Automation
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Generate Version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v1.0.${{ github.run_number }}-$SHORT_SHA"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: self-hosted
    needs: versioning
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Move Docker Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  deploy:
    name: Deploy to Application EC2
    runs-on: self-hosted
    needs:
      - versioning
      - build-and-push
    steps:
      - name: Deploy BookStack using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker network create bookstack-net || true
            docker network connect bookstack-net bookstack_db || true

            docker pull ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}

            docker stop bookstack_app || true
            docker rm bookstack_app || true

            docker run -d \
              --name bookstack_app \
              --restart unless-stopped \
              --network bookstack-net \
              -p 6875:80 \
              -e APP_URL=http://${{ secrets.EC2_HOST }}:6875 \
              -e APP_NAME=BookStacks \
              -e APP_KEY=${{ secrets.BOOKSTACK_APP_KEY }} \
              -e DB_HOST=bookstack_db \
              -e DB_PORT=3306 \
              -e DB_DATABASE=bookstack \
              -e DB_USERNAME=bookstack \
              -e DB_PASSWORD=bookstackpass \
              -v ~/BookStack/bookstack:/config \
              ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}

            docker ps

  unit-tests:
    name: Unit Test Cases
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: PHP Syntax Validation
        run: |
          php -v
          find app lang/en routes database tests -name "*.php" -print0 | xargs -0 -n1 php -l

  container-security-scan:
    name: Container Security Scanning
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    needs:
      - versioning
      - build-and-push
    steps:
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  slack-notification:
    name: Slack Notification
    runs-on: self-hosted
    needs:
      - versioning
      - build-and-push
      - deploy
    if: always()
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: BookStack Fast CI/CD
          SLACK_MESSAGE: "Version ${{ needs.versioning.outputs.image_tag }} deployed to http://${{ secrets.EC2_HOST }}:6875"
          SLACK_COLOR: good
