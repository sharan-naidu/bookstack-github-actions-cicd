  name: "BookStack CI CD Pipeline"

on:
push:
branches:
- main

env:
IMAGE_NAME: "${{ secrets.DOCKER_USERNAME }}/bookstack-cicd"

jobs:
versioning:
name: "Versioning Automation"
runs-on: ubuntu-latest
outputs:
image_tag: ${{ steps.version.outputs.image_tag }}

```
steps:
  - name: "Checkout Source Code"
    uses: actions/checkout@v5

  - name: "Generate Version"
    id: version
    run: |
      SHORT_SHA=$(git rev-parse --short HEAD)
      IMAGE_TAG="v2026.06.${{ github.run_number }}-$SHORT_SHA"
      echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
      echo "Generated version: $IMAGE_TAG"
```

unit-tests:
name: "Unit Test Cases"
runs-on: ubuntu-latest

```
steps:
  - name: "Checkout Source Code"
    uses: actions/checkout@v5

  - name: "Setup PHP"
    uses: shivammathur/setup-php@2.37.1
    with:
      php-version: "8.3"
      coverage: none

  - name: "Install Composer Dependencies"
    run: composer install --no-interaction --prefer-dist --no-progress

  - name: "Prepare Environment"
    run: |
      cp .env.example .env
      php artisan key:generate

  - name: "Run Unit Tests"
    run: php artisan test tests/Unit
```

build-and-push:
name: "Build and Push Docker Image"
runs-on: ubuntu-latest

```
needs:
  - versioning
  - unit-tests

steps:
  - name: "Checkout Source Code"
    uses: actions/checkout@v5

  - name: "Setup Docker Buildx"
    uses: docker/setup-buildx-action@v3

  - name: "Docker Hub Login"
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: "Build and Push Docker Image"
    uses: docker/build-push-action@v6
    with:
      context: .
      push: true
      tags: |
        ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
        ${{ env.IMAGE_NAME }}:latest
```

container-security-scan:
name: "Container Security Scanning"
runs-on: ubuntu-latest

```
needs:
  - versioning
  - build-and-push

steps:
  - name: "Trivy Security Scan"
    uses: aquasecurity/trivy-action@0.35.0
    with:
      image-ref: ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
      format: table
      severity: HIGH,CRITICAL
      exit-code: 0
```

slack-notification:
name: "Slack Notification"
runs-on: ubuntu-latest

```
needs:
  - versioning
  - unit-tests
  - build-and-push
  - container-security-scan

if: always()

steps:
  - name: "Send Slack Notification"
    uses: rtCamp/action-slack-notify@v2
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_TITLE: "BookStack CI/CD Pipeline"
      SLACK_MESSAGE: "Version ${{ needs.versioning.outputs.image_tag }} completed successfully."
      SLACK_COLOR: good
```

