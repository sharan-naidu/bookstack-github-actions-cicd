name: BookStack CI CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bookstack-cicd

jobs:
  versioning:
    name: Versioning Automation
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Generate image version
        id: version
        run: |
          IMAGE_TAG=v1.0.${{ github.run_number }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Generated version: $IMAGE_TAG"

  unit-tests:
    name: Unit Test Cases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate Dockerfile exists
        run: test -f Dockerfile

      - name: Validate compose file exists
        run: test -f docker-compose.yml

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ needs.versioning.outputs.image_tag }} .
          docker tag $IMAGE_NAME:${{ needs.versioning.outputs.image_tag }} $IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ needs.versioning.outputs.image_tag }}
          docker push $IMAGE_NAME:latest

  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    needs:
      - versioning
      - build-and-push
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - versioning
      - container-security-scan
    steps:
      - name: Deploy BookStack container to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/BookStack

            docker pull ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}

            docker stop bookstack_app || true
            docker rm bookstack_app || true

            docker compose down || true
            docker compose up -d

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
      - build-and-push
      - container-security-scan
      - deploy-to-ec2
    if: always()
    steps:
      - name: Send Slack notification
        run: |
          if [ "${{ needs.deploy-to-ec2.result }}" = "success" ]; then
            MESSAGE="✅ BookStack CI/CD success. Version ${{ needs.versioning.outputs.image_tag }} deployed to EC2: http://${{ secrets.EC2_HOST }}:6875"
          else
            MESSAGE="❌ BookStack CI/CD failed. Check GitHub Actions logs."
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
