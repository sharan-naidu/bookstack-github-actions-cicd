 <<'EOF'
name: BookStack CI CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bookstack-cicd

jobs:
  versioning:
    name: Versioning Automation
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Generate Version
        id: version
        run: |
          IMAGE_TAG=v1.0.${{ github.run_number }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Generated version: $IMAGE_TAG"

  unit-tests:
    name: Unit Test Cases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate Project Files
        run: |
          test -f Dockerfile
          test -f docker-compose.yml
          test -d resources/views
          test -d lang/en

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    needs:
      - versioning
      - build-and-push
    steps:
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - versioning
      - container-security-scan
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/BookStack
            docker compose pull
            docker compose down
            docker compose up -d --force-recreate

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs:
      - versioning
      - unit-tests
      - build-and-push
      - container-security-scan
      - deploy-to-ec2
    if: always()
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ needs.deploy-to-ec2.result }}
          SLACK_TITLE: BookStack CI/CD Pipeline
          SLACK_MESSAGE: |
            Version: ${{ needs.versioning.outputs.image_tag }}
            Status: ${{ needs.deploy-to-ec2.result }}
            URL: http://${{ secrets.EC2_HOST }}:6875
EOF
